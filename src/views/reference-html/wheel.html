<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>今天吃什麼輪盤 - 等等吃什麼</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="./assets/css/base.css" />
        <link rel="stylesheet" href="./assets/css/layout.css" />
        <link rel="stylesheet" href="./assets/css/components.css" />
        <link rel="stylesheet" href="./assets/css/pages/wheel.css" />

        <script src="./assets/js/pages/wheel.js"></script>
    </head>
    <body>
        <div
            class="wheel-page sub-page container-fluid d-flex flex-column min-vh-100"
        >
            <!-- Navbar（與 index.html 相同，僅 active 改到「今天吃什麼」；之後會元件化去掉重複）-->
            <nav
                class="nav d-flex align-items-center justify-content-center position-relative"
            >
                <div class="position-absolute start-0 brand-logo">
                    <span class="brand-logo__icon">🍱</span>
                    <span class="brand-logo__text">等等吃什麼</span>
                </div>

                <div class="d-flex align-items-center justify-content-center">
                    <a class="nav-link-custom" href="index.html">首頁</a>
                    <a class="nav-link-custom is-active" href="wheel.html"
                        >今天吃什麼</a
                    >
                    <a class="nav-link-custom" href="lunch-group.html"
                        >開團點餐</a
                    >
                    <a class="nav-link-custom" href="split-result.html"
                        >分帳結果</a
                    >
                </div>

                <div class="position-absolute end-0">
                    <a class="btn-primary-custom" href="lunch-group.html"
                        >建立午餐團</a
                    >
                </div>
            </nav>

            <!-- TODO Step 1：頁面標題區（今天吃什麼輪盤 + 副標）-->
            <header class="page-heading d-flex flex-column">
                <h1 class="page-heading__title">今天吃什麼輪盤</h1>
                <p class="page-heading__subtitle">選擇困難的時候，交給命運。</p>
            </header>

            <!-- TODO Step 2+：主內容（左輪盤 + 右面板）-->
            <main
                class="wheel-main d-flex flex-column column-gap-lg-5 flex-lg-row row-gap-3 align-items-center justify-content-center"
            >
                <div
                    class="wheel-spinner-wrap flex-shrink-0 d-flex flex-column align-items-center"
                >
                    <div class="wheel-spinner__pointer"></div>

                    <div class="wheel-spinner position-relative">
                        <div class="wheel-spinner__disc"></div>
                        <div
                            class="wheel-spinner__labels position-absolute"
                        ></div>
                        <button
                            class="wheel-spinner__center position-absolute top-50 start-50 translate-middle d-flex align-items-center justify-content-center"
                        >
                            轉
                        </button>
                    </div>
                </div>

                <div
                    class="wheel-panel flex-shrink-0 d-flex flex-column mb-4 mb-lg-0"
                >
                    <div
                        class="wheel-panel__candidates d-flex flex-column order-5 order-lg-1"
                    >
                        <p>候選名單</p>

                        <div
                            id="wheel-candidate-container"
                            class="wheel-candidate-list d-flex flex-wrap"
                        ></div>
                    </div>

                    <hr class="d-none d-lg-block order-lg-2" />

                    <div
                        class="wheel-panel__result d-flex flex-column order-3 order-lg-3"
                    >
                        <div class="card-custom flex-shrink-0">
                            <div class="card-custom__header">
                                <span class="card-custom__eyebrow"
                                    >✦ 今日抽中</span
                                >
                                <h2 id="selected-title"></h2>
                            </div>

                            <div
                                class="wheel-panel__result-details card-custom__body d-flex flex-column"
                            >
                                <!-- <p>💰 預估 $120</p> -->
                                <!-- <p>😌 適合：想吃飽、今天懶得想</p> -->
                            </div>
                        </div>
                    </div>

                    <button
                        id="spin-button"
                        class="btn-primary-custom order-2 order-lg-4"
                    >
                        轉一下 🎲
                    </button>
                    <a
                        href=""
                        class="wheel-panel__create-action btn-dark-custom order-4 order-lg-5"
                        >用這個建立午餐團 →</a
                    >
                </div>
            </main>
        </div>
    </body>
</html>
